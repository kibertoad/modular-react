packages:
  - "packages/*"
  - "packages/catalog/spa-src"
  - "examples/*"
  - "examples/*/*/app-shared"
  - "examples/*/*/shell"
  - "examples/*/*/modules/*"
  - "examples/*/*/journeys/*"
  - "examples/*/*/compositions/*"
allowBuilds:
  esbuild: false
  msw: false

overrides:
  # Pin the rolldown backend that rolldown-plugin-dts resolves to a single
  # version. Without this, pnpm's peer resolution picks the pre-release
  # rolldown@1.0.0-rc.18 (still in the tree via the examples' vite 8.0.x) for
  # some packages while others get 1.1.4, so dts is generated through two
  # different backends. This forces every package's plugin onto vite 8.1.x's
  # rolldown@1.1.4 without touching the examples' own vite.
  rolldown-plugin-dts>rolldown: 1.1.4

minimumReleaseAgeExclude:
  - "@vitest/expect@4.1.10"
  - "@vitest/mocker@4.1.10"
  - "@vitest/pretty-format@4.1.10"
  - "@vitest/runner@4.1.10"
  - "@vitest/snapshot@4.1.10"
  - "@vitest/spy@4.1.10"
  - "@vitest/utils@4.1.10"
  - vitest@4.1.10

onlyBuiltDependencies:
  - esbuild
  - msw
pmOnFail: ignore
