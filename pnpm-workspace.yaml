packages:
  - "packages/*"
  - "packages/catalog/spa-src"
  - "examples/*"
  - "examples/*/*/app-shared"
  - "examples/*/*/shell"
  - "examples/*/*/modules/*"
  - "examples/*/*/journeys/*"
  - "examples/*/*/compositions/*"
allowBuilds:
  esbuild: false
  msw: false

minimumReleaseAgeExclude:
  - "@vitest/expect@4.1.10"
  - "@vitest/mocker@4.1.10"
  - "@vitest/pretty-format@4.1.10"
  - "@vitest/runner@4.1.10"
  - "@vitest/snapshot@4.1.10"
  - "@vitest/spy@4.1.10"
  - "@vitest/utils@4.1.10"
  - vitest@4.1.10

onlyBuiltDependencies:
  - esbuild
  - msw
pmOnFail: ignore
