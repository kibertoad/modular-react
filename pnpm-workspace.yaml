packages:
  - "packages/*"
  - "packages/catalog/spa-src"
  - "examples/*"
  - "examples/*/*/app-shared"
  - "examples/*/*/shell"
  - "examples/*/*/modules/*"
  - "examples/*/*/journeys/*"
  - "examples/*/*/compositions/*"
allowBuilds:
  esbuild: false
  msw: false
  # Pulled in transitively by `pinia` (a tests-only devDependency of
  # `@modular-vue/vue` + `@modular-vue/journeys`). vue-demi's postinstall only
  # picks a Vue 2 vs Vue 3 entry shim; the workspace resolves Vue 3, so the
  # script is unnecessary. Recording the decision here (`false`, and left out of
  # `onlyBuiltDependencies` below, so the script stays unrun) is what keeps a
  # `--frozen-lockfile` install from failing with ERR_PNPM_IGNORED_BUILDS.
  vue-demi: false
  # Pulled in transitively by `nuxt@4.5.0` (the Nuxt 4 modal-journey example).
  # @parcel/watcher ships platform-specific prebuilt binaries as optional deps
  # (`@parcel/watcher-linux-x64-glibc` etc.), so its own node-gyp build script
  # is unnecessary — the prebuild is loaded at runtime. Recording the decision
  # here (`false`, and left out of `onlyBuiltDependencies` below, so the script
  # stays unrun) keeps a `--frozen-lockfile` install from failing with
  # ERR_PNPM_IGNORED_BUILDS.
  "@parcel/watcher": false

overrides:
  # Collapse rolldown to a single version workspace-wide. vue-router 5's key
  # (see the vite note below) transitively includes vite's own rolldown, so a
  # rolldown split (the nuxt/unplugin stack pulls 1.2.0; vite 8.1.5 prefers
  # ~1.1.5; rolldown-plugin-dts@0.26 hard-pins 1.1.4) fractured vue-router the
  # same way a vite split does. Pin the whole tree to 1.1.4 — the version
  # rolldown-plugin-dts@0.26 requires and that the package `build`/dts jobs
  # already pass on (vite 8.1.5 runs fine against it too). This globalizes the
  # old scoped `rolldown-plugin-dts>rolldown: 1.1.4` pin so every vue-router
  # consumer — packages and examples alike — shares one instance.
  rolldown: 1.1.4
  # Collapse vite 8 to a single version workspace-wide. vue-router 5 declares
  # `vite` as an OPTIONAL peer (it folded in unplugin-vue-router), so pnpm keys
  # vue-router's virtual-store dir by the resolved vite. With vite floating
  # between 8.1.3 and 8.1.5 the workspace grew multiple vue-router instances,
  # and vue-router's branded types (unique symbols + module augmentation) are
  # not assignable across instances — surfacing as spurious `RouteRecordRaw is
  # not assignable to RouteRecordRaw` typecheck errors in the Vue examples.
  # Pinning vite 8 to one version keeps vue-router a single instance. Scoped to
  # `vite@8` so the catalog SPA (vite 7, non-Vue) is untouched. NOTE: this is a
  # workspace-local guard only — it does NOT reach published consumers; see the
  # duplicate-vue-router guidance in the package READMEs for the downstream story.
  "vite@8": 8.1.5

minimumReleaseAgeExclude:
  - "@vitest/expect@4.1.10"
  - "@vitest/mocker@4.1.10"
  - "@vitest/pretty-format@4.1.10"
  - "@vitest/runner@4.1.10"
  - "@vitest/snapshot@4.1.10"
  - "@vitest/spy@4.1.10"
  - "@vitest/utils@4.1.10"
  - vitest@4.1.10
  # Nuxt 4 stack for the examples/vue/nuxt-modal-journey example — the freshly
  # released 4.5.0 family + Pinia 4, allowed through the release-age gate so a
  # fresh resolve doesn't stall on them. (The @nuxt/kit / @nuxt/schema 3.x that
  # @modular-vue/nuxt pulls are old enough and need no exclusion.)
  - nuxt@4.5.0
  - "@nuxt/kit@4.5.0"
  - "@nuxt/schema@4.5.0"
  - "@nuxt/nitro-server@4.5.0"
  - "@nuxt/vite-builder@4.5.0"
  - "@pinia/nuxt@1.0.1"
  - pinia@4.0.2
  # vue-router 5 is now the whole Vue family's baseline (Nuxt 4 requires it).
  - vue-router@5.2.0

onlyBuiltDependencies:
  - esbuild
  - msw
pmOnFail: ignore
