name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

# Cancel in-flight runs on the same PR when new commits land; for pushes to
# main keep every run so each main commit gets fully validated.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changed-files-job:
    name: Get changed packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: packages/**

      - name: Detect changed packages
        id: detect
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          declare -A PATH_TO_NAME=(
            ["packages/core"]="@modular-react/core"
            ["packages/react"]="@modular-react/react"
            ["packages/journeys"]="@modular-react/journeys"
            ["packages/compositions"]="@modular-react/compositions"
            ["packages/testing"]="@modular-react/testing"
            ["packages/catalog"]="@modular-react/catalog"
            ["packages/cli-core"]="@modular-react/cli-core"
            ["packages/frontend-core"]="@modular-frontend/core"
            ["packages/frontend-testing"]="@modular-frontend/testing"
            ["packages/compositions-engine"]="@modular-frontend/compositions-engine"
            ["packages/journeys-engine"]="@modular-frontend/journeys-engine"
            ["packages/react-router-cli"]="@react-router-modules/cli"
            ["packages/react-router-core"]="@react-router-modules/core"
            ["packages/react-router-runtime"]="@react-router-modules/runtime"
            ["packages/react-router-testing"]="@react-router-modules/testing"
            ["packages/tanstack-router-cli"]="@tanstack-react-modules/cli"
            ["packages/tanstack-router-core"]="@tanstack-react-modules/core"
            ["packages/tanstack-router-runtime"]="@tanstack-react-modules/runtime"
            ["packages/tanstack-router-testing"]="@tanstack-react-modules/testing"
            ["packages/vue"]="@modular-vue/vue"
            ["packages/vue-compositions"]="@modular-vue/compositions"
            ["packages/vue-journeys"]="@modular-vue/journeys"
            ["packages/vue-core"]="@modular-vue/core"
            ["packages/vue-runtime"]="@modular-vue/runtime"
            ["packages/vue-testing"]="@modular-vue/testing"
            ["packages/vue-cli"]="@modular-vue/cli"
            ["packages/vue-nuxt"]="@modular-vue/nuxt"
            ["packages/angular"]="@modular-angular/angular"
          )

          PACKAGES=()
          for path in "${!PATH_TO_NAME[@]}"; do
            if echo "$ALL_CHANGED_FILES" | grep -q "$path/"; then
              PACKAGES+=("\"${PATH_TO_NAME[$path]}\"")
            fi
          done

          if [ ${#PACKAGES[@]} -eq 0 ]; then
            echo 'packages=[]' >> $GITHUB_OUTPUT
            echo "No packages changed"
          else
            JSON="[$(IFS=,; echo "${PACKAGES[*]}")]"
            echo "packages=$JSON" >> $GITHUB_OUTPUT
            echo "Changed packages: $JSON"
          fi

  build:
    needs: [changed-files-job]
    if: needs.changed-files-job.outputs.packages != '[]'
    # The reusable workflow's job declares `permissions: contents: read`,
    # which the caller must be able to grant. The workflow-level
    # `permissions: {}` strips defaults, so the caller job has to opt in
    # explicitly — without this the workflow fails at startup before any
    # job runs.
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22.x, 24.x]
        package-name: ${{ fromJson(needs.changed-files-job.outputs.packages) }}
    uses: ./.github/workflows/ci.common.yml
    with:
      node_version: ${{ matrix.node-version }}
      package_name: ${{ matrix.package-name }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout reads the repo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          package-manager-cache: false

      - name: Install pnpm
        # Pin pnpm via `packageManager` in package.json (see ci.common.yml).
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  examples:
    name: Build examples
    # Lint + typecheck + build every example workspace. Runs on every PR —
    # examples depend on the library packages via `workspace:*`, so any
    # library change that breaks an example surfaces here.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          package-manager-cache: false

      - name: Install pnpm
        # Pin pnpm via `packageManager` in package.json (see ci.common.yml).
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      # Library packages must be built first so the examples' typecheck
      # and tests see emitted .d.ts files (the examples consume them via
      # linked workspace packages).
      - name: Build library packages
        run: pnpm turbo run build --filter="./packages/*"

      - name: Typecheck examples
        run: pnpm turbo run typecheck --filter="./examples/**"

      - name: Build examples
        run: pnpm turbo run build --filter="./examples/**"

      - name: Test examples
        run: pnpm turbo run test --filter="./examples/**"

  examples-e2e:
    name: E2E smoke (${{ matrix.shell }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - shell: customer-onboarding-shell
            example_path: examples/react-router/customer-onboarding-journey
            runtime_path: packages/react-router-runtime
            core_path: packages/react-router-core
          - shell: customer-onboarding-shell-tsr
            example_path: examples/tanstack-router/customer-onboarding-journey
            runtime_path: packages/tanstack-router-runtime
            core_path: packages/tanstack-router-core
          - shell: "@example-tsr-remote-capabilities/shell"
            shell_artifact: "example-tsr-remote-capabilities-shell"
            example_path: examples/tanstack-router/remote-capabilities
            runtime_path: packages/tanstack-router-runtime
            core_path: packages/tanstack-router-core
          # Compositions examples — exercise @modular-react/compositions
          # mounted inside each router's shell. The plugin (in
          # packages/compositions) is router-agnostic, so we cover both
          # routers to catch any regression in either runtime's provider
          # plumbing or the dedupe wiring.
          - shell: "@example-rr-editor-composition/shell"
            shell_artifact: "example-rr-editor-composition-shell"
            example_path: examples/react-router/editor-composition
            runtime_path: packages/react-router-runtime
            core_path: packages/react-router-core
          - shell: "@example-tsr-editor-composition/shell"
            shell_artifact: "example-tsr-editor-composition-shell"
            example_path: examples/tanstack-router/editor-composition
            runtime_path: packages/tanstack-router-runtime
            core_path: packages/tanstack-router-core
          # Vue examples — exercise the @modular-vue/* family mounted in
          # a real vue-router shell: sibling modules, a journey, and a
          # composition. Same duplicate-module / provider-plumbing regressions
          # the React/TanStack entries guard, on the Vue runtime.
          - shell: "@example-vue-integration-manager/shell"
            shell_artifact: "example-vue-integration-manager-shell"
            example_path: examples/vue/integration-manager
            runtime_path: packages/vue-runtime
            core_path: packages/vue-core
          - shell: "@example-vue-onboarding/shell"
            shell_artifact: "example-vue-onboarding-shell"
            example_path: examples/vue/customer-onboarding-journey
            runtime_path: packages/vue-runtime
            core_path: packages/vue-core
          - shell: "@example-vue-editor/shell"
            shell_artifact: "example-vue-editor-shell"
            example_path: examples/vue/editor-composition
            runtime_path: packages/vue-runtime
            core_path: packages/vue-core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect relevant changes
        id: changes
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          # Run when the target example changes, or when any package the
          # example links to changes. Journeys + compositions + the
          # runtime + core are the paths where a duplicate-module
          # regression would surface (each ships its own
          # module-private WeakMap of runtime internals).
          files: |
            ${{ matrix.example_path }}/**
            ${{ matrix.runtime_path }}/**
            ${{ matrix.core_path }}/**
            packages/journeys/**
            packages/compositions/**
            packages/react/**
            packages/core/**
            packages/vue/**
            packages/vue-journeys/**
            packages/vue-compositions/**
            packages/journeys-engine/**
            packages/compositions-engine/**
            packages/frontend-core/**
            .github/workflows/ci.yml
          # Skip docs-only and test-only edits — neither changes the
          # shipped dist bundle that the shell links against, so they
          # can't cause the duplicate-module regression this job guards.
          files_ignore: |
            **/*.md
            **/LICENSE
            **/CHANGELOG*
            **/*.test.ts
            **/*.test.tsx

      - name: Setup Node
        if: steps.changes.outputs.any_changed == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          package-manager-cache: false

      - name: Install pnpm
        if: steps.changes.outputs.any_changed == 'true'
        # Pin pnpm via `packageManager` in package.json (see ci.common.yml).
        run: corepack enable

      - name: Install
        if: steps.changes.outputs.any_changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build library packages
        if: steps.changes.outputs.any_changed == 'true'
        run: pnpm turbo run build --filter="./packages/*"

      - name: Install Playwright browsers
        if: steps.changes.outputs.any_changed == 'true'
        env:
          SHELL_FILTER: ${{ matrix.shell }}
        run: pnpm --filter "$SHELL_FILTER" exec playwright install --with-deps chromium

      - name: Run E2E smoke test
        if: steps.changes.outputs.any_changed == 'true'
        env:
          SHELL_FILTER: ${{ matrix.shell }}
        run: pnpm --filter "$SHELL_FILTER" test:e2e

      - name: Upload Playwright report on failure
        if: failure() && steps.changes.outputs.any_changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # `actions/upload-artifact` rejects `/` in artifact names, so the
          # matrix may set `shell_artifact` to a slash-free fallback (the
          # default `matrix.shell` is already valid for shells that use a
          # bare package name).
          name: playwright-report-${{ matrix.shell_artifact || matrix.shell }}
          path: ${{ matrix.example_path }}/shell/playwright-report/
          retention-days: 7

  catalog-e2e:
    name: Catalog E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect relevant changes
        id: changes
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          # The catalog demo exercises the public CLI against real example
          # modules/journeys. Run it when the catalog package changes, when
          # the demo fixture changes, or when this workflow changes.
          files: |
            packages/catalog/**
            examples/catalog/**
            examples/tanstack-router/customer-onboarding-journey/**
            examples/tanstack-router/journey-invoke/**
            .github/workflows/ci.yml

      - name: Setup Node
        if: steps.changes.outputs.any_changed == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          package-manager-cache: false

      - name: Install pnpm
        if: steps.changes.outputs.any_changed == 'true'
        # Pin pnpm via `packageManager` in package.json (see ci.common.yml).
        run: corepack enable

      - name: Install
        if: steps.changes.outputs.any_changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build library packages
        if: steps.changes.outputs.any_changed == 'true'
        run: pnpm turbo run build --filter="./packages/*"

      - name: Install Playwright browsers
        if: steps.changes.outputs.any_changed == 'true'
        run: pnpm --filter @example/catalog exec playwright install --with-deps chromium

      - name: Generate catalog and run Playwright tests
        if: steps.changes.outputs.any_changed == 'true'
        run: pnpm --filter @example/catalog test:e2e

      - name: Upload Playwright report on failure
        if: failure() && steps.changes.outputs.any_changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-catalog
          path: examples/catalog/playwright-report/
          retention-days: 7

  automerge:
    name: Auto-merge dependabot PRs
    needs: [build, lint, examples, examples-e2e, catalog-e2e]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped') && (needs.lint.result == 'success') && (needs.examples.result == 'success') && (needs.examples-e2e.result == 'success' || needs.examples-e2e.result == 'skipped') && (needs.catalog-e2e.result == 'success' || needs.catalog-e2e.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # fastify/github-action-merge-dependabot approves the dependabot PR
      contents: write # fastify/github-action-merge-dependabot performs the merge
    steps:
      - uses: fastify/github-action-merge-dependabot@73ec4cbb5e56df5591eae286972d5b2201ffe90f # v3.15.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
