name: Zizmor

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/zizmor.yml"

permissions: {}

# One audit per ref is plenty; cancel superseded PR runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  zizmor:
    name: Static analysis of GitHub Actions workflows
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout reads the repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        # Official action from zizmorcore. `advanced-security: false` is
        # required to enable `annotations: true` — the two output modes are
        # mutually exclusive. The action exits non-zero on any findings, so
        # CI fails when zizmor reports anything at or above `min-severity`.
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          persona: pedantic
          advanced-security: "false"
          annotations: "true"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
