name: Common CI
on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      node_version:
        required: true
        type: string

permissions: {}

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout reads the repo
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node ${{ inputs.node_version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          package-manager-cache: false

      - name: Install pnpm
        # `corepack enable` alone (no `prepare pnpm@latest`) makes pnpm
        # invocations honor the `packageManager` field in package.json, so
        # CI and local devs run the same pnpm version. Mixing `pnpm@latest`
        # in CI with a pinned local pnpm produces divergent lockfile shapes
        # and breaks `--frozen-lockfile`.
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: pnpm turbo run build --filter="$PACKAGE_NAME"

      - name: Run Tests
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: pnpm turbo run test --filter="$PACKAGE_NAME"
