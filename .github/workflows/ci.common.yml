name: Common CI
on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      node_version:
        required: true
        type: string

permissions: {}

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout reads the repo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node ${{ inputs.node_version }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node_version }}
          package-manager-cache: false

      - name: Install pnpm
        # `corepack enable` alone (no `prepare pnpm@latest`) makes pnpm
        # invocations honor the `packageManager` field in package.json, so
        # CI and local devs run the same pnpm version. Mixing `pnpm@latest`
        # in CI with a pinned local pnpm produces divergent lockfile shapes
        # and breaks `--frozen-lockfile`.
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: pnpm turbo run build --filter="$PACKAGE_NAME"

      - name: Run Tests
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: pnpm turbo run test --filter="$PACKAGE_NAME"
