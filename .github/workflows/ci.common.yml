name: Common CI
on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      node_version:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node ${{ inputs.node_version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          package-manager-cache: false

      - name: Install pnpm
        # `corepack enable` alone (no `prepare pnpm@latest`) makes pnpm
        # invocations honor the `packageManager` field in package.json, so
        # CI and local devs run the same pnpm version. Mixing `pnpm@latest`
        # in CI with a pinned local pnpm produces divergent lockfile shapes
        # and breaks `--frozen-lockfile`.
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter=${{ inputs.package_name }}

      - name: Run Tests
        run: pnpm turbo run test --filter=${{ inputs.package_name }}
