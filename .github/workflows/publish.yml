name: Publish to npm

on:
  pull_request:
    types:
      - closed
    branches:
      - main

# Prevent overlapping releases if multiple PRs merge close together
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  detect-changes:
    # Publish runs when the PR carries any of: major / minor / patch (auto-bump
    # paths) OR release-same-version (publish the versions already committed).
    if: >-
      github.event.pull_request.merged == true && (
        contains(github.event.pull_request.labels.*.name, 'patch') ||
        contains(github.event.pull_request.labels.*.name, 'minor') ||
        contains(github.event.pull_request.labels.*.name, 'major') ||
        contains(github.event.pull_request.labels.*.name, 'release-same-version')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}
      bump: ${{ steps.version.outputs.bump }}
      same_version: ${{ steps.version.outputs.same_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version strategy
        id: version
        run: |
          # release-same-version wins over major/minor/patch — the author
          # already committed the versions they want, so the workflow must
          # not re-bump them. Emit same_version=true; bump is unused in that
          # branch but still set to 'patch' as a safe default so other
          # conditionals don't evaluate against empty strings.
          if ${{ contains(github.event.pull_request.labels.*.name, 'release-same-version') }}; then
            echo "same_version=true" >> $GITHUB_OUTPUT
            echo "bump=none" >> $GITHUB_OUTPUT
          else
            echo "same_version=false" >> $GITHUB_OUTPUT
            if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
              echo "bump=major" >> $GITHUB_OUTPUT
            elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
              echo "bump=minor" >> $GITHUB_OUTPUT
            else
              echo "bump=patch" >> $GITHUB_OUTPUT
            fi
          fi

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            pkg_core:
              - 'packages/core/lib/**'
              - 'packages/core/src/**'
              - 'packages/core/package.json'
              - 'packages/core/README.md'
            pkg_react:
              - 'packages/react/lib/**'
              - 'packages/react/src/**'
              - 'packages/react/package.json'
              - 'packages/react/README.md'
            pkg_testing:
              - 'packages/testing/lib/**'
              - 'packages/testing/src/**'
              - 'packages/testing/package.json'
              - 'packages/testing/README.md'
            pkg_rr_cli:
              - 'packages/react-router-cli/src/**'
              - 'packages/react-router-cli/package.json'
              - 'packages/react-router-cli/README.md'
            pkg_rr_core:
              - 'packages/react-router-core/src/**'
              - 'packages/react-router-core/package.json'
              - 'packages/react-router-core/README.md'
            pkg_rr_runtime:
              - 'packages/react-router-runtime/src/**'
              - 'packages/react-router-runtime/package.json'
              - 'packages/react-router-runtime/README.md'
            pkg_rr_testing:
              - 'packages/react-router-testing/src/**'
              - 'packages/react-router-testing/package.json'
              - 'packages/react-router-testing/README.md'
            pkg_tr_cli:
              - 'packages/tanstack-router-cli/src/**'
              - 'packages/tanstack-router-cli/package.json'
              - 'packages/tanstack-router-cli/README.md'
            pkg_tr_core:
              - 'packages/tanstack-router-core/src/**'
              - 'packages/tanstack-router-core/package.json'
              - 'packages/tanstack-router-core/README.md'
            pkg_tr_runtime:
              - 'packages/tanstack-router-runtime/src/**'
              - 'packages/tanstack-router-runtime/package.json'
              - 'packages/tanstack-router-runtime/README.md'
            pkg_tr_testing:
              - 'packages/tanstack-router-testing/src/**'
              - 'packages/tanstack-router-testing/package.json'
              - 'packages/tanstack-router-testing/README.md'

      - name: Build dynamic matrix
        id: build-matrix
        run: |
          # Each entry: filter_key -> dir:npmName
          declare -A PKG_MAP=(
            ["pkg_core"]="core:@modular-react/core"
            ["pkg_react"]="react:@modular-react/react"
            ["pkg_testing"]="testing:@modular-react/testing"
            ["pkg_rr_cli"]="react-router-cli:@react-router-modules/cli"
            ["pkg_rr_core"]="react-router-core:@react-router-modules/core"
            ["pkg_rr_runtime"]="react-router-runtime:@react-router-modules/runtime"
            ["pkg_rr_testing"]="react-router-testing:@react-router-modules/testing"
            ["pkg_tr_cli"]="tanstack-router-cli:@tanstack-react-modules/cli"
            ["pkg_tr_core"]="tanstack-router-core:@tanstack-react-modules/core"
            ["pkg_tr_runtime"]="tanstack-router-runtime:@tanstack-react-modules/runtime"
            ["pkg_tr_testing"]="tanstack-router-testing:@tanstack-react-modules/testing"
          )

          CHANGED='${{ steps.filter.outputs.changes }}'
          echo "Changed filters: $CHANGED"

          MATRIX="["
          FIRST=true

          for key in "${!PKG_MAP[@]}"; do
            if echo "$CHANGED" | grep -q "\"$key\""; then
              IFS=':' read -r DIR NPM_NAME <<< "${PKG_MAP[$key]}"

              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                MATRIX+=","
              fi

              MATRIX+="{\"dir\":\"${DIR}\",\"npmName\":\"${NPM_NAME}\"}"
            fi
          done

          MATRIX+="]"

          echo "Generated matrix: $MATRIX"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          if [ "$MATRIX" = "[]" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  release:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes
        run: git pull --ff-only origin main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump versions for changed packages
        # Skip bumping entirely when the PR used release-same-version — the
        # versions in package.json are already the intended publish targets.
        if: needs.detect-changes.outputs.same_version != 'true'
        id: bump
        env:
          MATRIX: ${{ needs.detect-changes.outputs.matrix }}
          BUMP: ${{ needs.detect-changes.outputs.bump }}
        run: |
          echo "Packages to bump: $MATRIX"
          echo "Version bump type: $BUMP"

          for PKG_DIR in $(echo "$MATRIX" | jq -r '.[] | .dir'); do
            echo "Bumping version for $PKG_DIR..."
            cd "packages/$PKG_DIR"
            OLD_VERSION=$(node -p "require('./package.json').version")
            # pnpm version delegates to npm version but respects the workspace
            # layout; --no-git-tag-version matches the prior npm-based flow.
            pnpm version "$BUMP" --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "  $OLD_VERSION -> $NEW_VERSION"
            cd ../..
          done

      - name: Log publish versions
        env:
          MATRIX: ${{ needs.detect-changes.outputs.matrix }}
          SAME_VERSION: ${{ needs.detect-changes.outputs.same_version }}
        run: |
          if [ "$SAME_VERSION" = "true" ]; then
            echo "release-same-version: using versions as committed in package.json"
          fi
          for PKG_DIR in $(echo "$MATRIX" | jq -r '.[] | .dir'); do
            NPM_NAME=$(node -p "require('./packages/$PKG_DIR/package.json').name")
            VERSION=$(node -p "require('./packages/$PKG_DIR/package.json').version")
            echo "  $NPM_NAME@$VERSION"
          done

      - name: Build all packages
        run: pnpm turbo run build

      - name: Publish packages to npm
        id: publish
        env:
          # setup-node sets NODE_AUTH_TOKEN to a placeholder ('XXXXX-XXXXX-XXXXX-XXXXX')
          # when no token exists, which prevents npm from falling back to OIDC authentication.
          # Setting it to an empty/undefined secret clears the placeholder so that
          # pnpm/npm publish --provenance can authenticate via the GitHub Actions OIDC token.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          MATRIX: ${{ needs.detect-changes.outputs.matrix }}
        run: |
          PUBLISHED=""
          SKIPPED=""

          for PKG_DIR in $(echo "$MATRIX" | jq -r '.[] | .dir'); do
            cd "packages/$PKG_DIR"

            NPM_NAME=$(node -p "require('./package.json').name")
            VERSION=$(node -p "require('./package.json').version")

            if npm view "$NPM_NAME@$VERSION" version >/dev/null 2>&1; then
              echo "Skipping $NPM_NAME@$VERSION - already published"
              SKIPPED+="$NPM_NAME@$VERSION "
            else
              echo "Publishing $NPM_NAME@$VERSION..."
              # pnpm publish (vs. npm publish) is intentional:
              # - it rewrites any workspace:* / workspace:^ dep specs to real
              #   versions in the published tarball
              # - it respects the workspace's package manager (consistent with
              #   local dev and the `pnpm turbo run build` step above)
              # - --no-git-checks skips pnpm's dirty-working-tree guard, which
              #   would fire because the bump step just modified package.json
              pnpm publish --provenance --access public --no-git-checks
              PUBLISHED+="$NPM_NAME@$VERSION "
            fi

            cd ../..
          done

          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

      - name: Commit version bumps
        # Only meaningful when the workflow actually bumped versions. With
        # release-same-version the versions were already committed in the PR.
        if: needs.detect-changes.outputs.same_version != 'true'
        run: |
          git add packages/*/package.json
          if git diff --staged --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: bump versions [skip ci]"
          fi

      - name: Create tags for published packages
        env:
          MATRIX: ${{ needs.detect-changes.outputs.matrix }}
        run: |
          for PKG_DIR in $(echo "$MATRIX" | jq -r '.[] | .dir'); do
            NPM_NAME=$(node -p "require('./packages/$PKG_DIR/package.json').name")
            VERSION=$(node -p "require('./packages/$PKG_DIR/package.json').version")
            TAG="${NPM_NAME}@${VERSION}"

            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Warning: Tag already exists: $TAG (skipping)"
            else
              echo "Creating tag: $TAG"
              git tag "$TAG"
            fi
          done

      - name: Push commits and tags
        run: |
          git push
          git push --tags

      - name: Summary
        env:
          PUBLISHED: ${{ steps.publish.outputs.published }}
          SKIPPED: ${{ steps.publish.outputs.skipped }}
          SAME_VERSION: ${{ needs.detect-changes.outputs.same_version }}
          BUMP: ${{ needs.detect-changes.outputs.bump }}
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$SAME_VERSION" = "true" ]; then
            echo "**Strategy:** release-same-version (used versions committed in PR)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Strategy:** auto-bump ($BUMP)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -n "$PUBLISHED" ]; then
            echo "### Published packages" >> $GITHUB_STEP_SUMMARY
            for PKG in $PUBLISHED; do
              echo "- $PKG" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$SKIPPED" ]; then
            echo "### Skipped (already published)" >> $GITHUB_STEP_SUMMARY
            for PKG in $SKIPPED; do
              echo "- $PKG" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -z "$PUBLISHED" ] && [ -z "$SKIPPED" ]; then
            echo "No packages were published or skipped." >> $GITHUB_STEP_SUMMARY
          fi
