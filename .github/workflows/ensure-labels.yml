name: Ensure labels

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions: {}

# Only one label check per PR ref; new pushes supersede the previous run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ensure_labels:
    name: Ensure PR has proper labeling
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read # pull-request-label-checker reads the PR's labels
    steps:
      - name: Check one of required labels are set
        # agilepathway/pull-request-label-checker:v1.6.65 — pinned by digest so
        # the docker:// reference can't drift if the tag is moved.
        uses: docker://agilepathway/pull-request-label-checker@sha256:14f5f3dfda922496d07d53494e2d2b42885165f90677a1c03d600059b7706a61
        with:
          # release-same-version: publish with the versions already committed in
          # package.json (useful when the PR pre-bumped versions by hand, e.g.
          # a coordinated multi-package release where the author wanted to pin
          # exact versions in docs/examples). Mutually sensible with any of
          # major/minor/patch — if release-same-version is present, the bump
          # is skipped and those labels are ignored.
          one_of: major,minor,patch,skip-release,release-same-version
          repo_token: ${{ secrets.GITHUB_TOKEN }}
